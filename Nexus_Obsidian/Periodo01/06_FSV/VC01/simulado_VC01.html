<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulado — FSV | VC01</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 760px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 28px 20px 20px;
      border-bottom: 1px solid #2d3748;
      margin-bottom: 28px;
    }
    header .badge {
      display: inline-block;
      background: #1a2a4a;
      color: #63b3ed;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    header h1 { font-size: 22px; font-weight: 700; color: #f7fafc; margin-bottom: 6px; }
    header p { font-size: 14px; color: #718096; }

    #progress-bar-wrap {
      background: #2d3748;
      border-radius: 8px;
      height: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    #progress-bar { height: 100%; background: #4299e1; border-radius: 8px; transition: width 0.4s ease; width: 0%; }

    #status-line {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #718096;
      margin-bottom: 24px;
    }

    .card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .question-number {
      font-size: 12px;
      font-weight: 600;
      color: #63b3ed;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.55;
      color: #f0f4f8;
      margin-bottom: 22px;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #2d3748;
      border: 2px solid #2d3748;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 16px;
      line-height: 1.45;
      min-height: 44px;
      text-align: left;
      color: #e2e8f0;
    }
    .option:active { opacity: 0.85; }
    .option .letra {
      font-weight: 700;
      color: #63b3ed;
      min-width: 20px;
      padding-top: 1px;
    }
    .option.correct { background: #1a3a2a; border-color: #48bb78; color: #c6f6d5; }
    .option.correct .letra { color: #48bb78; }
    .option.wrong { background: #3a1a1a; border-color: #fc8181; color: #fed7d7; }
    .option.wrong .letra { color: #fc8181; }
    .option.disabled { cursor: default; pointer-events: none; }

    /* ── Painel de revisão pós-resposta ───────────────────────────── */
    .review {
      margin-top: 18px;
      display: none;
    }
    .review.show { display: block; }

    .review-banner {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .review-banner.ok { background: #1a3a2a; border-left: 4px solid #48bb78; color: #c6f6d5; }
    .review-banner.no { background: #3a1a1a; border-left: 4px solid #fc8181; color: #fed7d7; }

    .review-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #718096;
      margin: 18px 0 10px;
    }

    .alt-analysis { display: flex; flex-direction: column; gap: 8px; }
    .alt-row {
      display: flex;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #232b3a;
      border-left: 3px solid #4a5568;
      font-size: 14px;
      line-height: 1.5;
      color: #cbd5e0;
    }
    .alt-row .alt-letra {
      font-weight: 700;
      min-width: 18px;
      flex-shrink: 0;
    }
    .alt-row.is-correct { border-left-color: #48bb78; background: #16261c; }
    .alt-row.is-correct .alt-letra { color: #48bb78; }
    .alt-row.is-chosen-wrong { border-left-color: #fc8181; background: #2a1818; }
    .alt-row.is-chosen-wrong .alt-letra { color: #fc8181; }
    .alt-row .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 5px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .alt-row.is-correct .tag { background: #1a3a2a; color: #48bb78; }
    .alt-row.is-chosen-wrong .tag { background: #3a1a1a; color: #fc8181; }

    .ref-box {
      background: #16202e;
      border: 1px solid #2c5282;
      border-left: 4px solid #4299e1;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #bee3f8;
      margin-top: 4px;
    }
    .ref-box .ref-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #63b3ed;
      margin-bottom: 6px;
    }

    .deepen-box {
      background: #1f1a2e;
      border: 1px solid #553c9a;
      border-left: 4px solid #9f7aea;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #e9d8fd;
      margin-top: 4px;
    }
    .deepen-box .deepen-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #b794f4;
      margin-bottom: 6px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-next { background: #3182ce; color: #fff; display: none; }
    .btn-next.show { display: block; }
    .btn-restart { background: #2d3748; color: #e2e8f0; margin-top: 16px; }

    #result-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    #result-screen.show { display: block; }
    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 8px solid #3182ce;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .score-num { font-size: 38px; font-weight: 800; color: #f7fafc; }
    .score-den { font-size: 14px; color: #718096; }
    .score-pct { font-size: 20px; font-weight: 700; color: #63b3ed; margin-bottom: 8px; }
    .score-msg { font-size: 15px; color: #a0aec0; line-height: 1.5; margin-bottom: 28px; }

    #question-screen { display: block; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">CFO T16 · CBMPA · Revisão comentada</div>
    <h1>Simulado — FSV | VC01</h1>
    <p>20 questões · cada alternativa comentada — acerte ou erre, a revisão continua</p>
  </header>

  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="status-line">
    <span id="status-q">Questão 1 de 20</span>
    <span id="status-score">Acertos: 0</span>
  </div>

  <div id="question-screen">
    <div class="card">
      <div class="question-number" id="q-number">QUESTÃO 01</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>

      <div class="review" id="q-review">
        <div class="review-banner" id="review-banner"></div>

        <div class="review-section-title">Análise de cada alternativa</div>
        <div class="alt-analysis" id="alt-analysis"></div>

        <div id="ref-wrap"></div>
        <div id="deepen-wrap"></div>
      </div>

      <button class="btn btn-next" id="btn-next">Próxima questão →</button>
    </div>
  </div>

  <div id="result-screen">
    <div class="score-circle">
      <div class="score-num" id="res-num">0</div>
      <div class="score-den" id="res-den">de 20</div>
    </div>
    <div class="score-pct" id="res-pct">0%</div>
    <div class="score-msg" id="res-msg"></div>
    <button class="btn btn-restart" onclick="restart()">↺ Refazer simulado</button>
  </div>
</div>

<script>
const LETRAS = ['A','B','C','D','E'];

/*
  Cada questão carrega, em cada alternativa, seu próprio comentário (certa ou errada),
  permitindo revisar as 5 ao final — não só a escolhida. referencia = dado técnico/definição
  fechada do material; aprofundamento = conexão com assunto vizinho do mesmo escopo.
*/
const QUESTIONS_RAW = [
  {
    q: "Um motorista perde o controle do veículo em uma curva e colide contra um muro de contenção fixo, à margem da via. Segundo a classificação de tipos de sinistro estudada em FSV, esse evento é:",
    opts: [
      {
        text: "Colisão lateral — pois o impacto atingiu a lateral do veículo.",
        correct: false,
        comment: "Errada. Colisão e choque não são definidos pela região da carroceria atingida (frontal, lateral, traseira), e sim pela natureza do segundo objeto envolvido. \"Lateral\" descreve onde o impacto ocorreu — não muda a classificação central: aqui o segundo objeto (o muro) está fixo."
      },
      {
        text: "Choque — porque envolve um veículo em movimento colidindo contra um objeto fixo.",
        correct: true,
        comment: "Certa. Choque é exatamente isso: veículo em movimento contra objeto fixo ou imóvel (poste, muro, árvore). Colisão, por contraste, exige dois objetos em movimento — geralmente veículo contra veículo."
      },
      {
        text: "Colisão frontal — pois o impacto se deu na frente do veículo.",
        correct: false,
        comment: "Errada. \"Frontal\" descreve a direção do impacto na carroceria — característica que pode estar presente tanto em colisões quanto em choques. O que define \"choque\" não é o ângulo do impacto, mas o muro estar fixo e imóvel."
      },
      {
        text: "Tombamento — já que o veículo provavelmente tombou após bater no muro.",
        correct: false,
        comment: "Errada. Tombamento é definido pelo movimento do próprio veículo (giro sobre o eixo longitudinal), não pela natureza do objeto atingido. Um choque pode até ser seguido de um tombamento, mas são classificações independentes — descrevem momentos diferentes do mesmo sinistro."
      },
      {
        text: "Capotamento — pois houve perda de controle antes do impacto.",
        correct: false,
        comment: "Errada. Mesma lógica do tombamento: capotamento descreve o giro do veículo sobre o eixo transversal — é uma classificação do movimento do próprio veículo, não do tipo de impacto contra outro objeto."
      }
    ],
    referencia: "Choque = veículo em movimento + objeto fixo/imóvel (poste, muro, árvore). Colisão = dois objetos em movimento (ex: veículo × veículo).",
    aprofundamento: "Vale separar duas classificações que a prova gosta de misturar: o <strong>tipo de sinistro</strong> (colisão / choque / tombamento / capotamento) descreve como o evento começou; a <strong>posição final do veículo</strong> (sobre 4 rodas / tombado / capotado / complexo) descreve como a equipe vai encontrá-lo — e é essa segunda classificação que define a estratégia de estabilização. Um choque, por exemplo, pode terminar em qualquer uma das quatro posições."
  },
  {
    q: "Em 2023, o Código de Trânsito Brasileiro (CTB) passou a adotar oficialmente o termo \"sinistro de trânsito\" no lugar de \"acidente de trânsito\". Segundo essa alteração, o que justifica tecnicamente essa substituição terminológica?",
    opts: [
      {
        text: "O termo \"sinistro\" reforça que o evento decorre de causas identificáveis e envolve responsabilidade — diferente de \"acidente\", que sugere fatalidade inevitável.",
        correct: true,
        comment: "Certa. A troca de termo não é apenas estilística: \"acidente\" carrega a ideia de evento fortuito, sem causa identificável; \"sinistro\" reconhece que há uma cadeia de causas (excesso de velocidade, falha mecânica, infração) e, portanto, responsabilidade a apurar. É essa mudança de perspectiva — de fatalidade para causalidade — que a alteração do CTB pretende consolidar."
      },
      {
        text: "\"Sinistro\" é o termo técnico usado exclusivamente para eventos com vítimas fatais, enquanto \"acidente\" continua válido para casos sem mortes.",
        correct: false,
        comment: "Errada. A definição de sinistro de trânsito não distingue eventos por gravidade ou existência de vítimas fatais — ela se aplica a qualquer evento em vias/áreas públicas envolvendo ao menos um veículo em movimento que resulte em danos, fatais ou não. Vincular o termo apenas a mortes é uma restrição que o conceito não prevê."
      },
      {
        text: "A mudança apenas atualiza a nomenclatura para se alinhar a termos usados internacionalmente, sem alterar o conceito jurídico do evento.",
        correct: false,
        comment: "Errada. Essa alternativa minimiza a mudança como puramente cosmética — mas o sentido da alteração é justamente o oposto: ela reposiciona o conceito do evento, deslocando-o de \"fatalidade sem causa\" para \"evento com causa e responsabilidade\". Não é uma troca de rótulo neutra."
      },
      {
        text: "\"Sinistro de trânsito\" passou a abranger apenas eventos entre dois ou mais veículos em movimento, excluindo choques contra objetos fixos.",
        correct: false,
        comment: "Errada. Essa alternativa confunde a definição de sinistro de trânsito com a definição de colisão (que exige dois objetos em movimento). O conceito de sinistro de trânsito é mais amplo: basta um veículo em movimento envolvido — o que inclui tanto colisões quanto choques contra objetos fixos."
      },
      {
        text: "O novo termo elimina a necessidade de perícia técnica em ocorrências de menor gravidade, simplificando o registro administrativo.",
        correct: false,
        comment: "Errada. A alteração terminológica não tem relação com procedimentos periciais ou administrativos de registro — ela atua no plano conceitual, redefinindo como o evento é nomeado e compreendido. Associá-la a uma simplificação processual é uma extrapolação sem base no conceito estudado."
      }
    ],
    referencia: "Sinistro de trânsito (CTB, alteração 2023): evento em vias/áreas públicas com pelo menos um veículo em movimento, que resulte em danos. A troca do termo \"acidente\" por \"sinistro\" é intencional — reforça que há causa e responsabilidade.",
    aprofundamento: "Essa mudança terminológica é a porta de entrada conceitual para o resto da disciplina: se o sinistro tem causa identificável, faz sentido que a prevenção (Fase 1 — Preparação) e a análise pós-ocorrência (debriefing, na Fase 4 — Finalização) sejam tratadas como parte do mesmo ciclo, não como apêndices. A terminologia não é só formalidade — ela sustenta a lógica de que cada ocorrência gera aprendizado para a próxima."
  },
  {
    q: "Durante o reconhecimento da cena em uma ocorrência de SV, a equipe constata que um poste caiu sobre o veículo sinistrado e há fios de alta tensão em contato com a carroceria. A vítima está consciente e sem sinais de gravidade extrema. Qual é a conduta tecnicamente correta da guarnição?",
    opts: [
      {
        text: "Iniciar o atendimento com luvas de borracha isolantes, já que a vítima está consciente e o tempo de resposta é crítico.",
        correct: false,
        comment: "Errada. Não existe EPI de bombeiro certificado para as tensões de uma rede elétrica — luvas de uso geral não oferecem isolamento suficiente. Essa é exatamente a armadilha do risco elétrico: ele parece \"controlável com EPI\", mas não é."
      },
      {
        text: "Aguardar a desenergização da rede pela concessionária de energia antes de qualquer atuação na zona quente, mesmo sem sinais de gravidade extrema na vítima.",
        correct: true,
        comment: "Certa. O risco elétrico é o único item da lista de riscos da cena classificado como bloqueante total — a regra não admite exceção, nem diante de vítima consciente, nem sob pressão de tempo. A equipe aguarda a concessionária desenergizar a rede antes de qualquer intervenção na zona quente."
      },
      {
        text: "Acionar um eletricista da própria guarnição para cortar os fios com ferramenta isolada.",
        correct: false,
        comment: "Errada. \"Eletricista\" não é uma função prevista no protocolo de SV para esse risco — a autoridade técnica e legal para desenergizar a rede é exclusivamente da concessionária de energia, não de terceiros, ainda que tecnicamente capacitados."
      },
      {
        text: "Reclassificar o risco elétrico como \"atenuável\", já que a vítima está clinicamente estável, e seguir com a abordagem padrão.",
        correct: false,
        comment: "Errada. A classificação do risco elétrico como bloqueante não depende do estado clínico da vítima — é uma característica do próprio risco (alta letalidade e ausência de EPI adequado), não da gravidade do caso atendido."
      },
      {
        text: "Isolar a zona quente e autorizar a entrada da equipe com EPI completo e proteção extra contra choque elétrico.",
        correct: false,
        comment: "Errada. Essa alternativa reproduz a lógica usada para outros riscos da cena (vidros, airbags etc.), em que \"isolar + EPI + proteção extra\" libera a operação. O risco elétrico é a exceção que rompe esse padrão: nenhuma combinação de isolamento e proteção autoriza a atuação antes da desenergização pela concessionária."
      }
    ],
    referencia: "Risco elétrico = bloqueante total. Não existe EPI de bombeiro certificado para tensões de rede. Não há atuação na zona quente antes da desenergização pela concessionária de energia.",
    aprofundamento: "Esse é o único item da tabela de riscos da cena (combustível, rede elétrica, airbags, vidros, veículo elétrico/híbrido, incêndio) que <strong>bloqueia totalmente</strong> a operação. Todos os outros têm uma ação de mitigação que permite seguir (isolar, trocar EPI, proteger etc.) — o risco elétrico costuma ser usado pela banca justamente para testar se o candidato sabe diferenciar \"risco mitigável\" de \"risco bloqueante\"."
  },
  {
    q: "Uma guarnição de SV é acionada para uma ocorrência. Ao chegar ao local, ela posiciona a viatura a 45° em relação ao veículo sinistrado, inicia o isolamento da área e organiza as zonas de trabalho. Considerando o ciclo de quatro fases do atendimento em SV, essas ações fazem parte de qual fase — e qual etapa, dentro dela, normalmente vem em seguida?",
    opts: [
      {
        text: "Fase de Resposta; em seguida vem a montagem do palco de ferramentas, sobre lona resistente, na zona morna.",
        correct: true,
        comment: "Certa. Posicionamento da viatura, isolamento e organização das zonas são as primeiras etapas da fase de Resposta — a mais extensa, com 13 etapas em sequência obrigatória. Logo depois delas vem a montagem do palco de ferramentas sobre lona resistente, na zona morna, antes mesmo da avaliação da cena e da estabilização."
      },
      {
        text: "Fase de Acionamento; em seguida vem o deslocamento da guarnição até o local da ocorrência.",
        correct: false,
        comment: "Errada. O deslocamento — junto da triagem e da coleta de informações sobre o sinistro — é próprio da fase de Acionamento, que ocorre antes da chegada ao local. As ações descritas (posicionar viatura, isolar, organizar zonas) só são possíveis depois que a guarnição já chegou — ou seja, já estão na fase seguinte."
      },
      {
        text: "Fase de Preparação; em seguida vem a conferência do material e o treinamento contínuo da equipe.",
        correct: false,
        comment: "Errada. Conferência de material e treinamento contínuo são atividades permanentes da fase de Preparação — que ocorre antes de qualquer acionamento, não durante o atendimento de uma ocorrência específica. As ações do enunciado já pressupõem que a guarnição está na cena, atendendo ao chamado."
      },
      {
        text: "Fase de Resposta; em seguida vem diretamente o desencarceramento da vítima, etapa central dessa fase.",
        correct: false,
        comment: "Errada. O desencarceramento é, de fato, central na fase de Resposta — mas está longe de ser a etapa seguinte ao isolamento e à organização das zonas. Entre uma e outra, a sequência obrigatória ainda passa por palco de ferramentas, área de descarte, avaliação da cena, avaliação 360° e estabilização. Pular essas etapas na resposta da questão reproduz o erro mais perigoso do protocolo: pular etapas na prática."
      },
      {
        text: "Fase de Finalização; em seguida vem o debriefing e a análise estruturada da ocorrência.",
        correct: false,
        comment: "Errada. Debriefing e análise estruturada acontecem na fase de Finalização — a última do ciclo, voltada à desmobilização e ao aprendizado pós-ocorrência. As ações descritas (posicionamento, isolamento, zonas) acontecem no início do atendimento propriamente dito, fase de Resposta — etapa muito anterior à finalização."
      }
    ],
    referencia: "4 fases: Preparação → Acionamento → Resposta → Finalização. A Resposta tem 13 etapas em sequência obrigatória: posicionamento da viatura (45°) → isolamento → organização das zonas → palco de ferramentas (sobre lona, na zona morna) → área de descarte → avaliação da cena → avaliação 360° → estabilização → acesso ao interior → criação de espaço → desencarceramento → extração → cena segura + coleta de dados.",
    aprofundamento: "A lógica por trás dessa sequência é que cada etapa cria as condições físicas ou de segurança para a etapa seguinte — por isso pular uma delas (especialmente a estabilização, para \"ganhar tempo\") é apontado pelo material como o principal vetor de acidente com bombeiros no SV. Vale revisar essa cadeia como uma história contínua, não como uma lista solta para decorar."
  },
  {
    q: "Durante uma ocorrência de SV, um membro da guarnição precisa montar o palco de ferramentas e organizar a área de descarte de estruturas removidas do veículo. Em qual zona essas atividades devem ocorrer, e sobre qual superfície o palco de ferramentas deve ser montado?",
    opts: [
      {
        text: "Na zona morna, com o palco de ferramentas montado sobre lona resistente.",
        correct: true,
        comment: "Certa. A zona morna é exatamente o espaço destinado ao palco de ferramentas — montado sobre lona resistente — e à área de descarte de estruturas removidas. Ela funciona como zona de apoio operacional, intermediária entre a zona quente (onde está o veículo) e a zona fria (acesso livre para guinchos, polícia e ambulâncias)."
      },
      {

      {
        text: "Comandar exclusivamente os técnicos nas operações externas de corte, já que as funções dos socorristas são fixas e intransferíveis durante a ocorrência.",
        correct: false,
        comment: "Errada. Além de atribuir ao Socorrista 1 uma função que não é dele (o contato com os técnicos se dá na reunião tripartida, junto ao comandante), a alternativa contradiz uma característica explícita do protocolo: as funções não são taxativas — podem ser alteradas conforme o desenvolvimento da ocorrência, ao comando do Socorrista 1."
      },
      {
        text: "Aguardar a estabilização secundária completa do veículo antes de qualquer contato verbal ou visual com a vítima.",
        correct: false,
        comment: "Errada. A abordagem inicial deve ser realizada assim que o socorrista visualiza a vítima — não espera a estabilização secundária, nem mesmo a primária no caso da verbalização e, se possível, do oxigênio. Atrasar o contato até a estabilização total desperdiçaria exatamente o tempo que a classificação da vítima (10 ou 25 minutos) torna precioso."
      }
    ],
    referencia: "Abordagem: em geral 2 socorristas, funções NÃO taxativas (alteradas ao comando do Socorrista 1). Socorrista 1 — posicionamento frontal + verbalização (evita giro da cervical); se possível, oxigênio antes mesmo da estabilização primária. Socorrista 2 — procura espaço para acessar o interior do veículo.",
    aprofundamento: "A verbalização do Socorrista 1 é também avaliação disfarçada de conversa: \"lembra do que aconteceu?\" levanta a cinemática; \"está vendo sangue?\" rastreia hemorragia; \"que dia é hoje?\" e \"onde sente dor?\" medem o nível de consciência; \"alguma parte do corpo está presa?\" dimensiona o grau de encarceramento. Cada pergunta do roteiro alimenta uma etapa do XABCDE antes mesmo do contato físico."
  },
  {
    q: "Com os dois socorristas no interior do veículo, inicia-se a criação de espaço interno. Sobre os procedimentos internos e a preparação para a extração, qual alternativa está correta?",
    opts: [
      {
        text: "Os procedimentos que dependem dos controles elétricos (bancos, volante, vidros, portas) são realizados ANTES de desligar o veículo; a chave da ignição, celulares e objetos de valor são entregues ao comandante da operação; e, antes da extração, trocam-se as luvas de salvamento por luvas de procedimento.",
        correct: true,
        comment: "Certa. A ordem tem lógica funcional: tudo que depende de energia elétrica é feito antes do desligamento — depois, os mesmos ajustes só podem ser feitos manualmente. A chave vai para o comandante (junto com celulares, valores e documentos, para identificação das vítimas e salvaguarda de bens), e a troca de luvas de salvamento por luvas de procedimento marca a transição para o contato direto com o paciente na extração."
      },
      {
        text: "O primeiro procedimento interno é desligar o veículo e retirar a chave da ignição — só depois disso é seguro movimentar bancos, volante e vidros pelos controles elétricos.",
        correct: false,
        comment: "Errada. Desligar primeiro inutilizaria os controles elétricos: bancos, volante, vidros e travas elétricas parariam de responder, e toda a movimentação teria de ser feita manualmente — mais lenta e trabalhosa. Por isso a sequência correta aciona os recursos elétricos antes do desligamento do veículo."
      },
      {
        text: "A chave da ignição deve permanecer no contato, para que os socorristas possam reacionar os controles elétricos caso seja necessário criar mais espaço durante a operação.",
        correct: false,
        comment: "Errada. A chave é retirada da ignição e entregue ao comandante da operação — manter a possibilidade de religar o veículo (e seus airbags) durante a operação é exatamente o risco que o procedimento elimina. A eventual perda de conveniência é o preço da segurança da equipe e da vítima."
      },
      {
        text: "Os encostos de cabeça devem ser mantidos nos bancos durante toda a operação, pois servem de apoio para a imobilização cervical da vítima na extração.",
        correct: false,
        comment: "Errada. A retirada dos encostos de cabeça é um dos procedimentos internos de criação de espaço listados no protocolo — eles são removidos, não mantidos. A RMC cervical é realizada pelas mãos do socorrista e pelos equipamentos de imobilização próprios, não pelo encosto do banco."
      },
      {
        text: "Na extração, mantêm-se as luvas de salvamento — mais resistentes — e a coordenação cabe a qualquer membro da equipe que esteja mais próximo da vítima no momento.",
        correct: false,
        comment: "Errada. Dois erros: as luvas de salvamento são trocadas por luvas de procedimento antes do contato direto com o paciente (a luva contaminada do trabalho de corte não toca a vítima); e a coordenação da extração não é difusa — cabe ao militar responsável da equipe de resgate ou ao profissional de saúde presente na cena. Antes disso, desliga-se ainda a motobomba do conjunto desencarcerador à combustão, se for o caso."
      }
    ],
    referencia: "Procedimentos internos: freio estacionário (4 rodas) → procedimentos pelos controles ELÉTRICOS → desligar o veículo (chave → comandante) → protetor de airbag → movimentação manual → retirar encostos de cabeça → celulares/valores/documentos → comandante. Extração: desligar motobomba à combustão; coordenação pelo responsável do resgate ou profissional de saúde; trocar luvas de salvamento por luvas de procedimento; evitar giros; manter alinhamento da coluna.",
    aprofundamento: "Repare como esse bloco fecha o ciclo com a <strong>reunião tripartida</strong>: após a avaliação primária, o socorrista repassa as informações ao comandante e aos técnicos para definirem rota e técnica de extração — e ela pode se repetir conforme a ocorrência evolui. A criação de espaço interno, os trabalhos externos dos técnicos (acompanhados com proteção flexível e rígida sobre a vítima) e a extração final são executados sobre o que ficou decidido nessa reunião."
  }
];

let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestion(raw) {
  const shuffledOpts = shuffle(raw.opts);
  return {
    q: raw.q,
    opts: shuffledOpts,
    correctIndex: shuffledOpts.findIndex(o => o.correct),
    referencia: raw.referencia,
    aprofundamento: raw.aprofundamento
  };
}

function init() {
  questions = shuffle(QUESTIONS_RAW).map(buildQuestion);
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('question-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('result-screen').classList.remove('show');
  render();
}

function render() {
  const q = questions[current];
  answered = false;
  document.getElementById('q-number').textContent = `QUESTÃO ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('status-q').textContent = `Questão ${current + 1} de ${questions.length}`;
  document.getElementById('status-score').textContent = `Acertos: ${score}`;
  document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;

  const review = document.getElementById('q-review');
  review.classList.remove('show');
  document.getElementById('alt-analysis').innerHTML = '';
  document.getElementById('ref-wrap').innerHTML = '';
  document.getElementById('deepen-wrap').innerHTML = '';

  const btnNext = document.getElementById('btn-next');
  btnNext.className = 'btn btn-next';

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letra">${LETRAS[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => choose(i);
    container.appendChild(btn);
  });
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  const btnNext = document.getElementById('btn-next');

  opts.forEach(o => o.classList.add('disabled'));

  const acertou = idx === q.correctIndex;
  if (acertou) score++;

  opts[q.correctIndex].classList.add('correct');
  if (!acertou) opts[idx].classList.add('wrong');

  document.getElementById('status-score').textContent = `Acertos: ${score}`;

  // Banner
  const banner = document.getElementById('review-banner');
  if (acertou) {
    banner.textContent = `✓ Você acertou — alternativa ${LETRAS[idx]}.`;
    banner.className = 'review-banner ok';
  } else {
    banner.textContent = `✗ Você marcou ${LETRAS[idx]} — a alternativa correta é ${LETRAS[q.correctIndex]}. Veja por quê abaixo:`;
    banner.className = 'review-banner no';
  }

  // Varredura de todas as alternativas (não só a escolhida)
  const altWrap = document.getElementById('alt-analysis');
  altWrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const row = document.createElement('div');
    let cls = 'alt-row';
    let tag = '';
    if (i === q.correctIndex) {
      cls += ' is-correct';
      tag = '<span class="tag">Correta</span>';
    } else if (i === idx) {
      cls += ' is-chosen-wrong';
      tag = '<span class="tag">Sua escolha</span>';
    }
    row.className = cls;
    row.innerHTML = `<span class="alt-letra">${LETRAS[i]}${tag}</span><span>${opt.comment}</span>`;
    altWrap.appendChild(row);
  });

  // Bloco de referência técnica
  const refWrap = document.getElementById('ref-wrap');
  if (q.referencia) {
    refWrap.innerHTML = `
      <div class="review-section-title">Para fixar</div>
      <div class="ref-box"><span class="ref-label">Definição / dado técnico</span>${q.referencia}</div>
    `;
  }

  // Aprofundamento — conexão com assunto vizinho
  const deepenWrap = document.getElementById('deepen-wrap');
  if (q.aprofundamento) {
    deepenWrap.innerHTML = `
      <div class="review-section-title">Indo além desta questão</div>
      <div class="deepen-box"><span class="deepen-label">Conexão com outro ponto do conteúdo</span>${q.aprofundamento}</div>
    `;
  }

  document.getElementById('q-review').classList.add('show');

  if (current < questions.length - 1) {
    btnNext.textContent = 'Próxima questão →';
  } else {
    btnNext.textContent = 'Ver resultado →';
  }
  btnNext.className = 'btn btn-next show';
}

document.getElementById('btn-next').onclick = function() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('progress-bar').style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('res-num').textContent = score;
  document.getElementById('res-den').textContent = `de ${questions.length}`;
  document.getElementById('res-pct').textContent = `${pct}%`;
  let msg = '';
  if (pct >= 90) msg = 'Excelente! Domínio sólido do conteúdo. Continue assim para a prova.';
  else if (pct >= 70) msg = 'Bom desempenho. Revise os pontos errados antes da prova.';
  else if (pct >= 50) msg = 'Desempenho mediano. Retorne ao material e refaça o simulado.';
  else msg = 'Atenção: pontuação abaixo do esperado. Revise o resumo e os pontos-chave antes de tentar novamente.';
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('result-screen').classList.add('show');
}

function restart() {
  init();
  window.scrollTo(0, 0);
}

init();
</script>
