<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — FSV | VC01</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 680px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 24px 16px 18px;
      border-bottom: 1px solid #2d3748;
      margin-bottom: 24px;
    }
    .badge {
      display: inline-block;
      background: #1a2a4a;
      color: #63b3ed;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #f7fafc; margin-bottom: 4px; }
    header p { font-size: 13px; color: #718096; }

    #deck-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #718096;
      margin-bottom: 18px;
    }
    #counter { font-weight: 600; color: #a0aec0; }
    #pile-info { font-size: 12px; }

    #progress-wrap {
      background: #2d3748;
      border-radius: 6px;
      height: 4px;
      margin-bottom: 22px;
      overflow: hidden;
    }
    #progress-bar { height: 100%; background: #4299e1; border-radius: 6px; transition: width 0.35s ease; }

    /* FLIP CARD */
    .scene {
      width: 100%;
      perspective: 1000px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .card-3d {
      position: relative;
      width: 100%;
      min-height: 220px;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .card-3d.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      width: 100%;
      min-height: 220px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .face-front {
      background: #1a202c;
      border: 1px solid #2d3748;
    }
    .face-back {
      background: #162032;
      border: 1px solid #2c4a6e;
      transform: rotateY(180deg);
    }

    .face-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .face-front .face-label { color: #718096; }
    .face-back .face-label { color: #63b3ed; }

    .face-front .term {
      font-size: 22px;
      font-weight: 700;
      color: #f7fafc;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .face-front .hint {
      font-size: 13px;
      color: #4a5568;
    }
    .face-back .definition {
      font-size: 16px;
      color: #e2e8f0;
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .face-back .context {
      font-size: 13px;
      color: #63b3ed;
      line-height: 1.4;
      padding-top: 10px;
      border-top: 1px solid #2c4a6e;
    }

    /* Placeholder card height */
    .card-placeholder { height: 220px; }

    .tap-hint {
      text-align: center;
      font-size: 13px;
      color: #4a5568;
      margin-bottom: 18px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-know { background: #276749; color: #c6f6d5; }
    .btn-review { background: #7b341e; color: #feebc8; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 13px;
      border: 1px solid #2d3748;
      border-radius: 12px;
      background: transparent;
      color: #a0aec0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.15s;
      margin-bottom: 10px;
    }
    .btn-secondary:active { background: #2d3748; }

    #done-screen, #retry-screen { display: none; text-align: center; padding: 40px 20px; }
    #done-screen.show, #retry-screen.show { display: block; }
    .done-icon { font-size: 48px; margin-bottom: 16px; }
    .done-title { font-size: 22px; font-weight: 700; color: #f7fafc; margin-bottom: 8px; }
    .done-sub { font-size: 15px; color: #a0aec0; margin-bottom: 28px; line-height: 1.5; }
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 28px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 32px; font-weight: 800; }
    .stat-label { font-size: 12px; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-num.green { color: #48bb78; }
    .stat-num.orange { color: #ed8936; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">CFO T16 · CBMPA · Periodo01</div>
    <h1>Flashcards — FSV | VC01</h1>
    <p id="header-sub">Fundamentos do Salvamento Veicular</p>
  </header>

  <div id="main-deck">
    <div id="deck-info">
      <span id="counter">1 / 48</span>
      <span id="pile-info"></span>
    </div>
    <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>

    <div class="scene" id="scene" onclick="flipCard()">
      <div class="card-3d" id="card3d">
        <div class="face face-front">
          <div class="face-label">Conceito</div>
          <div class="term" id="card-term"></div>
          <div class="hint" id="card-hint"></div>
        </div>
        <div class="face face-back">
          <div class="face-label">Definição</div>
          <div class="definition" id="card-def"></div>
          <div class="context" id="card-ctx"></div>
        </div>
      </div>
    </div>

    <p class="tap-hint">Toque no cartão para ver a resposta</p>

    <div class="action-row">
      <button class="btn btn-know" onclick="markKnow()">✓ Sei</button>
      <button class="btn btn-review" onclick="markReview()">↺ Revisar depois</button>
    </div>
    <button class="btn-secondary" onclick="shuffleAndRestart()">⇄ Embaralhar e reiniciar</button>
  </div>

  <div id="done-screen">
    <div class="done-icon">🎯</div>
    <div class="done-title">Baralho concluído!</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num green" id="stat-know">0</div><div class="stat-label">Sei</div></div>
      <div class="stat"><div class="stat-num orange" id="stat-rev">0</div><div class="stat-label">Revisar</div></div>
    </div>
    <div class="done-sub" id="done-msg"></div>
    <button class="btn btn-review" style="width:100%;margin-bottom:12px;font-size:16px;" onclick="retryReview()">↺ Revisar cartões pendentes</button>
    <button class="btn-secondary" onclick="shuffleAndRestart()">⇄ Reiniciar tudo</button>
  </div>
</div>

let deck = [];
let reviewPile = [];
let current = 0;
let knownCount = 0;
let reviewCount = 0;
let isFlipped = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init(cards) {
  deck = [...cards];
  reviewPile = [];
  current = 0;
  knownCount = 0;
  reviewCount = 0;
  isFlipped = false;
  document.getElementById('main-deck').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
  render();
}

function render() {
  if (current >= deck.length) { showDone(); return; }
  const c = deck[current];
  isFlipped = false;
  document.getElementById('card3d').classList.remove('flipped');
  document.getElementById('card-term').textContent = c.term;
  document.getElementById('card-hint').textContent = c.hint;
  document.getElementById('card-def').textContent = c.def;
  document.getElementById('card-ctx').textContent = c.ctx;
  document.getElementById('counter').textContent = `${current + 1} / ${deck.length}`;
  document.getElementById('pile-info').textContent = reviewPile.length > 0 ? `${reviewPile.length} para revisar` : '';
  const pct = (current / deck.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card3d').classList.toggle('flipped', isFlipped);
}

function markKnow() {
  knownCount++;
  current++;
  render();
}

function markReview() {
  reviewPile.push(deck[current]);
  reviewCount++;
  current++;
  render();
}

function showDone() {
  document.getElementById('main-deck').style.display = 'none';
  document.getElementById('stat-know').textContent = knownCount;
  document.getElementById('stat-rev').textContent = reviewCount;
  let msg = '';
  if (reviewCount === 0) msg = 'Excelente! Você dominou todos os cartões. Revise o simulado para reforçar o conteúdo.';
  else if (reviewCount <= 5) msg = `Bom trabalho! ${reviewCount} cartões para revisar. Foque nesses antes da prova.`;
  else msg = `${reviewCount} cartões precisam de revisão. Clique em "Revisar cartões pendentes" para focar neles.`;
  document.getElementById('done-msg').textContent = msg;
  document.getElementById('done-screen').style.display = 'block';
  document.getElementById('done-screen').classList.add('show');
}

function retryReview() {
  if (reviewPile.length === 0) { shuffleAndRestart(); return; }
  init(shuffle(reviewPile));
}

function shuffleAndRestart() {
  init(shuffle(ALL_CARDS));
}

init(shuffle(ALL_CARDS));
</script>
